# Optional manual pipeline: blue → green → traffic switch → verify → rollback on failure
# Use when releases are infrequent and you want an explicit promotion step (vs. ci-cd.yaml on every push).
name: Blue-green deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target label (e.g. production-east)"
        required: false
        default: "production"
        type: string

concurrency:
  group: blue-green-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  backend-check:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FLASK_ENV: testing
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt
      - run: pip install -r requirements.txt && pip install -r requirements-ci.txt
      - run: python -m pytest tests/ -q --tb=short -n auto -m "not performance"
      - run: python -m pytest tests/ -q --tb=short -n 0 -m performance

  deploy-blue-idle:
    name: Ensure blue (current live) is recorded
    runs-on: ubuntu-latest
    needs: [build, backend-check]
    steps:
      - run: |
          echo "Snapshot current LIVE revision (blue) for rollback — e.g. kubectl get deploy -o wide, image digest, Terraform state."
          echo "Target: ${{ inputs.target }}"

  deploy-green:
    name: Deploy to GREEN (candidate)
    runs-on: ubuntu-latest
    needs: [deploy-blue-idle]
    outputs:
      candidate_id: ${{ steps.out.outputs.candidate_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - id: out
        run: echo "candidate_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
      - run: |
          echo "Push new build to GREEN slot only; production traffic still on BLUE."
          ls dist/ | head -5

  smoke-green:
    name: Smoke test GREEN
    runs-on: ubuntu-latest
    needs: [deploy-green]
    steps:
      - name: Hit green-only URL or internal service
        env:
          GREEN_URL: ${{ secrets.GREEN_HEALTH_URL }}
        run: |
          if [ -z "$GREEN_URL" ]; then echo "Set GREEN_HEALTH_URL to smoke the candidate."; exit 0; fi
          curl -fsS --retry 3 "$GREEN_URL"

  promote:
    name: Promote — traffic to GREEN
    runs-on: ubuntu-latest
    needs: [smoke-green]
    steps:
      - run: |
          echo "Switch load balancer / DNS / service mesh weight to send 100% to GREEN."
          echo "Candidate: ${{ needs.deploy-green.outputs.candidate_id }}"

  rollback:
    name: Rollback to BLUE
    runs-on: ubuntu-latest
    needs: [deploy-green, smoke-green, promote]
    if: ${{ always() && (needs.deploy-green.result != 'success' || needs.smoke-green.result == 'failure' || needs.promote.result != 'success') }}
    steps:
      - run: |
          echo "Failure detected — revert traffic to BLUE and/or re-deploy last known-good artifact."
          exit 1
