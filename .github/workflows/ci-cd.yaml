# Full-stack CI/CD: cache, parallel tests, security, perf budget, blue/green-style deploy, smoke, rollback
name: CI CD

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "eslint.config.*"
      - "tailwind*"
      - "backend/**"
      - ".github/workflows/ci-cd.yaml"
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error

  backend:
    name: Backend — pytest (parallel + performance)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FLASK_ENV: testing
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Parallel tests (exclude performance budget)
        run: python -m pytest tests/ -q --tb=short -n auto -m "not performance"

      - name: Performance budget tests (serial)
        run: python -m pytest tests/ -q --tb=short -n 0 -m performance

  security:
    name: Security — audit & Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt

      - name: Install audit tools
        run: pip install -r backend/requirements-ci.txt

      - name: pip-audit
        working-directory: backend
        run: pip-audit -r requirements.txt --desc on

      - name: Bandit (SAST)
        working-directory: backend
        run: bandit -r app -c .bandit.yml -q -ll

  deploy-green:
    name: Deploy — green slot (candidate)
    runs-on: ubuntu-latest
    needs: [frontend, backend, security]
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Record release metadata
        id: meta
        run: |
          echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Deploy candidate (replace with blue/green target)
        run: |
          echo "Deploy to GREEN / staging slot — traffic still on BLUE until promotion."
          echo "Examples: second Kubernetes Deployment, App Service slot, ALB target group."
          ls -la dist/ | head -8

  promote-traffic:
    name: Promote — switch traffic to green
    runs-on: ubuntu-latest
    needs: [deploy-green]
    steps:
      - name: Switch live traffic to new version
        run: |
          echo "Flip load balancer / ingress / feature flag so GREEN becomes live."
          echo "Coordinate with deploy-green outputs: ${{ needs.deploy-green.outputs.version }}"

  smoke-and-monitor:
    name: Smoke test & monitoring hooks
    runs-on: ubuntu-latest
    needs: [promote-traffic]
    steps:
      - name: Health check (optional URL)
        env:
          HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "Set repository secret DEPLOY_HEALTH_URL (e.g. https://api.example.com/health) to enable live checks."
            exit 0
          fi
          curl -fsS --retry 3 --retry-delay 2 "$HEALTH_URL"

      - name: Monitoring event (optional)
        env:
          MONITORING_WEBHOOK: ${{ secrets.MONITORING_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$MONITORING_WEBHOOK" ]; then
            echo "Optional: set MONITORING_DEPLOY_WEBHOOK for Datadog/New Relic/custom notifier."
            exit 0
          fi
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"Deploy OK ${{ github.repository }}@${{ github.sha }}\"}" \
            "$MONITORING_WEBHOOK" || true

  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy-green, promote-traffic, smoke-and-monitor]
    if: ${{ always() && (needs.deploy-green.result != 'success' || needs.promote-traffic.result != 'success' || needs.smoke-and-monitor.result == 'failure') }}
    steps:
      - name: Automated rollback (placeholder)
        run: |
          echo "A prior stage failed — run your rollback: re-point LB to BLUE, kubectl rollout undo,"
          echo "re-deploy previous artifact from GHCR/S3, or restore last Terraform state."
          exit 1
