# Pull requests: lint, build, parallel tests, security scans, performance budget — no deploy
name: Pull request

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend — pytest (parallel + perf)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FLASK_ENV: testing
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Unit & integration tests (parallel workers)
        run: python -m pytest tests/ -q --tb=short -n auto -m "not performance"

      - name: Performance budget tests (serial)
        run: python -m pytest tests/ -q --tb=short -n 0 -m performance

  security:
    name: Security — SAST & dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend deps (lockfile audit)
        run: npm ci

      - name: npm audit (supply chain)
        run: npm audit --audit-level=moderate

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt

      - name: Install audit tools
        run: pip install -r backend/requirements-ci.txt

      - name: pip-audit (Python dependencies)
        working-directory: backend
        run: pip-audit -r requirements.txt --desc on

      - name: Bandit (SAST — application code)
        working-directory: backend
        run: bandit -r app -c .bandit.yml -q -ll
