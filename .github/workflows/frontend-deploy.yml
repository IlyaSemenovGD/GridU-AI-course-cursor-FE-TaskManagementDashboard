# Frontend: build and deploy (runs on relevant pushes to the default branch, or manually)
name: Frontend deploy

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "eslint.config.*"
      - "tailwind*"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: fe-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy (placeholder)
        id: deploy
        run: |
          echo "url=https://example.com" >> "$GITHUB_OUTPUT"
          echo "Replace with static hosting: S3, CloudFront, Netlify, Vercel, Cloudflare Pages, GitHub Pages, etc."
          ls -la dist/ | head -20
