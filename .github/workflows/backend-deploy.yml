# Backend: test and deploy (runs on relevant pushes to the default branch, or manually)
name: Backend deploy

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: be-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FLASK_ENV: testing
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Run pytest (parallel + performance)
        run: |
          python -m pytest tests/ -q --tb=short -n auto -m "not performance"
          python -m pytest tests/ -q --tb=short -n 0 -m performance

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        id: deploy
        run: |
          echo "url=https://example.com" >> "$GITHUB_OUTPUT"
          echo "Replace with: Docker build + push, Fly.io/Heroku/Cloud Run, SSH/rsync to a server, etc."
          ls -la backend/ | head -15
