# Full QA automation: unit tests (Vitest + pytest), ESLint, Pylint, Snyk, OWASP ZAP, Lighthouse, k6, dashboard + AI recommendations.
# Optional secrets: SNYK_TOKEN, OPENAI_API_KEY, OPENAI_MODEL
name: QA automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa-frontend-unit:
    name: QA — Vitest + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: mkdir -p qa-reports
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: qa-frontend-unit
          path: qa-reports

  qa-e2e:
    name: QA — Playwright E2E (Page Object Model)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: mkdir -p qa-reports
      - name: E2E tests
        run: npx playwright test
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-e2e
          path: qa-reports

  qa-frontend-lint:
    name: QA — ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: mkdir -p qa-reports
      - name: ESLint JSON report (always written)
        run: npx eslint . -f json -o qa-reports/eslint.json || true
      - name: ESLint (enforces clean run)
        run: npm run lint
      - uses: actions/upload-artifact@v4
        with:
          name: qa-eslint
          path: qa-reports

  qa-backend-tests:
    name: QA — pytest + coverage + JUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      FLASK_ENV: testing
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt
      - run: mkdir -p ../qa-reports/pytest
      - name: pytest
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=app \
            --cov-report=json:../qa-reports/pytest/coverage.json \
            --cov-report=term-missing \
            --junitxml=../qa-reports/pytest/junit.xml
      - uses: actions/upload-artifact@v4
        with:
          name: qa-backend-tests
          path: qa-reports

  qa-backend-pylint:
    name: QA — Pylint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt
      - name: Pylint (log + score gate)
        run: |
          mkdir -p ../qa-reports
          set -o pipefail
          pylint app --fail-under=8.5 2>&1 | tee ../qa-reports/pylint.txt
      - uses: actions/upload-artifact@v4
        with:
          name: qa-backend-pylint
          path: qa-reports

  qa-security-snyk:
    name: QA — Snyk (Node + Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt
      - run: npm ci
      - run: mkdir -p qa-reports
      - name: Snyk (JSON reports)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo '{"skipped":true}' > qa-reports/snyk-root.json
            echo '{"skipped":true}' > qa-reports/snyk-backend.json
            echo "::notice::SNYK_TOKEN not set — stub Snyk reports"
            exit 0
          fi
          npx -y snyk test --all-projects --severity-threshold=high --json-file-output=qa-reports/snyk-root.json
          (cd backend && npx -y snyk test --file=requirements.txt --severity-threshold=high --json-file-output=../qa-reports/snyk-backend.json)
      - uses: actions/upload-artifact@v4
        with:
          name: qa-security-snyk
          path: qa-reports

  qa-lighthouse:
    name: QA — Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: mkdir -p qa-reports/lighthouse
      - run: npm run lhci
      - uses: actions/upload-artifact@v4
        with:
          name: qa-lighthouse
          path: qa-reports

  qa-zap-k6:
    name: QA — k6 + OWASP ZAP baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt
      - uses: grafana/setup-k6-action@v1
      - run: npm ci
      - name: Install backend & start API
        working-directory: backend
        env:
          FLASK_ENV: testing
          FLASK_APP: run:app
        run: |
          pip install -r requirements.txt
          nohup flask run --host 127.0.0.1 --port 5000 > /tmp/flask-qa.log 2>&1 &
          echo $! > /tmp/flask-qa.pid
          cd ..
          npx wait-on -t 120000 http-get://127.0.0.1:5000/health
      - name: k6 smoke
        run: |
          mkdir -p qa-reports
          k6 run qa/k6/api-smoke.js --summary-export=qa-reports/k6-summary.json
      - name: OWASP ZAP baseline (Docker host network)
        run: |
          mkdir -p qa-reports
          docker run --rm --network host \
            -v "$PWD/qa-reports:/zap/wrk/:rw" \
            zaproxy/zap-stable \
            zap-baseline.py -t http://127.0.0.1:5000 -J /zap/wrk/zap-report.json -r /zap/wrk/zap-report.html -I
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/flask-qa.pid ]; then kill "$(cat /tmp/flask-qa.pid)" || true; fi
          tail -80 /tmp/flask-qa.log || true
      - uses: actions/upload-artifact@v4
        with:
          name: qa-zap-k6
          path: qa-reports

  qa-dashboard:
    name: QA — dashboard + AI recommendations
    runs-on: ubuntu-latest
    needs:
      - qa-frontend-unit
      - qa-e2e
      - qa-frontend-lint
      - qa-backend-tests
      - qa-backend-pylint
      - qa-security-snyk
      - qa-lighthouse
      - qa-zap-k6
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: qa-*
          merge-multiple: true
          path: .
      - name: List merged qa-reports
        run: ls -laR qa-reports || true
      - name: Aggregate + HTML dashboard + AI text
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          node scripts/qa/aggregate-summary.mjs
          node scripts/qa/ai-recommendations.mjs
          node scripts/qa/build-dashboard.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: qa-dashboard
          path: |
            qa-reports/summary.json
            qa-reports/dashboard
            qa-reports/ai-recommendations.md
            qa-reports/ai-recommendations.html
